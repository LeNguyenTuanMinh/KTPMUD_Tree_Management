<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bee Pollen Management</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-wrapper">

<div class="auth-card">
    <!-- Logo -->
    <div class="brand">🐝</div>
    <h3>Hệ thống Quản lý Phấn hoa</h3>
    <p class="subtitle">Đăng nhập vào tài khoản của bạn</p>

    <!-- Error Message -->
    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i>
        Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Logout Success Message -->
    <div th:if="${param.logout}" class="alert alert-info alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        Bạn đã đăng xuất thành công.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Registration Success Message -->
    <div th:if="${param.registered}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        Đăng ký thành công! Vui lòng đăng nhập.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Password Reset Success Message -->
    <div th:if="${param.passwordReset}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        Mật khẩu đã được đặt lại thành công. Vui lòng đăng nhập.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">
        <!-- Username -->
        <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Nhập tên đăng nhập" required autofocus>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <div class="d-flex justify-content-between">
                <label for="password" class="form-label">Mật khẩu</label>
                <a th:href="@{/forgot-password}" class="text-decoration-none small text-muted">Quên mật khẩu?</a>
            </div>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Nhập mật khẩu" required>
            </div>
        </div>

        <!-- Remember Me -->
        <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
            <label class="form-check-label text-muted" for="rememberMe">Ghi nhớ đăng nhập</label>
        </div>

        <!-- Submit Button -->
        <div class="d-grid mb-4">
            <button type="submit" class="btn btn-honey btn-lg shadow-sm fw-bold">
                <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
            </button>
        </div>
    </form>

    <!-- Register Link -->
    <div class="text-center text-muted">
        Chưa có tài khoản?
        <a th:href="@{/register}" class="text-decoration-none fw-bold text-success">Đăng ký tại đây</a>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
