<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Bee Pollen Management</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    
    <!-- Layout specific head elements -->
    <th:block layout:fragment="head-extras"></th:block>
</head>
<body th:class="${bodyClass ?: 'bg-light'}">

<div class="d-flex wrapper">
    <!-- Sidebar -->
    <div th:replace="~{fragments/components :: sidebar}"></div>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper flex-grow-1 d-flex flex-column min-vh-100 w-100 overflow-hidden">
        
        <!-- Top Navbar -->
        <div th:replace="~{fragments/components :: navbar}"></div>

        <!-- Page Content -->
        <main class="main-content flex-grow-1 p-4 overflow-auto">
            <!-- Global Alerts Slot (Toasts) -->
            <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
                <th:block th:if="${successMessage != null and !successMessage.isEmpty()}">
                    <div th:replace="~{fragments/components :: toast-success(${successMessage})}"></div>
                </th:block>
                <th:block th:if="${errorMessage != null and !errorMessage.isEmpty()}">
                    <div th:replace="~{fragments/components :: toast-error(${errorMessage})}"></div>
                </th:block>
            </div>
            
            <div layout:fragment="content">
                <!-- Page content goes here -->
            </div>
        </main>
        
        <!-- Footer -->
        <div th:replace="~{fragments/components :: footer}"></div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Sidebar toggle for mobile
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('show');
    }

    // Auto-dismiss alerts after 5 seconds
    document.addEventListener('DOMContentLoaded', function () {
        const alerts = document.querySelectorAll('.alert-dismissible');
        alerts.forEach(function (alert) {
            setTimeout(function () {
                const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                if (bsAlert) {
                    bsAlert.close();
                }
            }, 5000);
        });

        // Initialize Toasts
        const toastElList = document.querySelectorAll('.toast');
        const toastList = [...toastElList].map(toastEl => new bootstrap.Toast(toastEl));
        toastList.forEach(toast => toast.show());
    });
</script>

<!-- Layout specific script elements -->
<th:block layout:fragment="script-extras"></th:block>

</body>
</html>
