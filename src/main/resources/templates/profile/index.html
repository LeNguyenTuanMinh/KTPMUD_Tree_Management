<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>My Profile</title>
</head>
<body>

<div layout:fragment="content">
    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-12">
                <h2><i class="bi bi-person-circle text-primary me-2"></i>My Profile</h2>
                <p class="text-muted mb-0">Manage your account details and view your activity log.</p>
            </div>
        </div>

        <div class="row">
            <!-- Left Column: Profile Info & Password Change -->
            <div class="col-lg-4 mb-4">
                <!-- User Info Card -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body text-center py-4">
                        <img th:src="@{https://api.dicebear.com/8.x/initials/svg(seed=${user.username})}" 
                             class="rounded-circle img-thumbnail mb-3" width="120" height="120" alt="Profile Avatar">
                        <h4 class="mb-1 fw-bold" th:text="${user.fullName}">User Name</h4>
                        <p class="text-muted mb-3" th:text="${user.email}">user@example.com</p>
                        <span class="badge bg-primary" th:text="${user.role}">ROLE</span>
                        
                        <hr class="my-4">
                        <div class="text-start">
                            <p class="mb-1 text-muted small text-uppercase fw-bold">Username</p>
                            <p class="mb-3 fw-semibold text-dark" th:text="${user.username}">username</p>
                            
                            <p class="mb-1 text-muted small text-uppercase fw-bold">Joined Date</p>
                            <p class="mb-0 fw-semibold text-dark" th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</p>
                        </div>
                    </div>
                </div>

                <!-- Password Change Card -->
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2"></i>Change Password</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/profile/password}" th:object="${passwordChangeRequest}" method="post">
                            <div class="mb-3">
                                <label for="currentPassword" class="form-label text-muted small fw-bold">Current Password</label>
                                <input type="password" class="form-control bg-light" id="currentPassword" th:field="*{currentPassword}" required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label text-muted small fw-bold">New Password</label>
                                <input type="password" class="form-control bg-light" id="newPassword" th:field="*{newPassword}" required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                            </div>
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label text-muted small fw-bold">Confirm New Password</label>
                                <input type="password" class="form-control bg-light" id="confirmPassword" th:field="*{confirmPassword}" required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Update Password</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right Column: Activity Log -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-3">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-clock-history me-2"></i>Recent Activity</h5>
                    </div>
                    <div class="card-body p-0">
                        <div th:if="${#lists.isEmpty(recentActivities)}" class="text-center py-5">
                            <i class="bi bi-journal-x text-muted" style="font-size: 3rem;"></i>
                            <p class="mt-3 text-muted">No recent activity found.</p>
                        </div>
                        <div class="table-responsive" th:unless="${#lists.isEmpty(recentActivities)}">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light text-muted small text-uppercase">
                                    <tr>
                                        <th class="ps-4">Entity</th>
                                        <th>Name/Details</th>
                                        <th>Action</th>
                                        <th class="pe-4">Date & Time</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="activity : ${recentActivities}">
                                        <td class="ps-4">
                                            <span class="badge" 
                                                  th:classappend="${activity.entityType == 'Plant' ? 'bg-success' : 
                                                                  (activity.entityType == 'Pollen' ? 'bg-warning text-dark' : 
                                                                  (activity.entityType == 'Bee Colony' ? 'bg-primary' : 'bg-info text-dark'))}"
                                                  th:text="${activity.entityType}">Entity</span>
                                        </td>
                                        <td class="fw-semibold text-dark" th:text="${activity.entityName}">Name</td>
                                        <td>
                                            <span class="badge rounded-pill border"
                                                  th:classappend="${activity.action == 'Created' ? 'border-success text-success' : 'border-primary text-primary'}"
                                                  th:text="${activity.action}">Action</span>
                                        </td>
                                        <td class="text-muted pe-4" th:text="${#temporals.format(activity.timestamp, 'MMM dd, yyyy HH:mm:ss')}">Time</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
