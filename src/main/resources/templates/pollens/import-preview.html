<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Preview Imported Pollen Data</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-earmark-pdf text-danger me-2"></i> Preview Pollen Import</h2>
        <a th:href="@{/pollens}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Cancel
        </a>
    </div>

    <div class="alert alert-warning" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        Dữ liệu được trích xuất từ PDF. Vui lòng kiểm tra trước khi lưu.
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/pollens}" th:object="${pollen}" method="post">
                
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="name" class="form-label">Pollen Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</div>
                    </div>
                    <div class="col-md-4">
                        <label for="shape" class="form-label">Shape <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="shape" th:field="*{shape}" required>
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('shape')}" th:errors="*{shape}">Error</div>
                    </div>
                    <div class="col-md-4">
                        <label for="sizeMicron" class="form-label">Size (Microns)</label>
                        <input type="number" step="0.1" class="form-control" id="sizeMicron" th:field="*{sizeMicron}">
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('sizeMicron')}" th:errors="*{sizeMicron}">Error</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="surfaceCharacteristic" class="form-label">Surface Characteristic</label>
                    <textarea class="form-control" id="surfaceCharacteristic" th:field="*{surfaceCharacteristic}" rows="3"></textarea>
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('surfaceCharacteristic')}" th:errors="*{surfaceCharacteristic}">Error</div>
                </div>

                <!-- Un-extracted fields -->
                <div class="mb-3">
                    <label for="microscopeImage" class="form-label">Microscope Image URL</label>
                    <input type="url" class="form-control" id="microscopeImage" th:field="*{microscopeImage}">
                </div>

                <div class="mb-4">
                    <label class="form-label">Found In Plants</label>
                    <div class="card p-3 bg-light">
                        <div class="row">
                            <div class="col-md-4 mb-2" th:each="plantOpt : ${allPlants}">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" 
                                           th:field="*{plantIds}" 
                                           th:value="${plantOpt.id}"
                                           th:id="${'plant_' + plantOpt.id}">
                                    <label class="form-check-label" th:for="${'plant_' + plantOpt.id}">
                                        <span th:text="${plantOpt.commonName}">Plant Name</span>
                                        <small class="text-muted fst-italic" th:text="${'(' + plantOpt.scientificName + ')'}">Scientific</small>
                                    </label>
                                </div>
                            </div>
                            <div class="col-12 text-muted" th:if="${allPlants == null or allPlants.empty}">
                                <em>No plants available. Create plants first.</em>
                            </div>
                        </div>
                    </div>
                </div>

                <hr class="my-4">
                
                <div class="d-flex justify-content-end gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-1"></i> Save Pollen
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
