<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Quản lý Người dùng - Bee Pollen Management</title>
</head>
<body>

<div layout:fragment="content">
    <div th:replace="~{fragments/components :: breadcrumb('Hệ thống', 'Quản lý Người dùng')}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-gray-800">
            <i class="bi bi-people-fill text-primary me-2"></i> Danh sách Tài khoản
        </h2>
    </div>

    <!-- Users Table -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Tên đăng nhập</th>
                        <th>Họ và tên</th>
                        <th>Email</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody class="border-top-0">
                    <tr th:if="${users == null or users.isEmpty()}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                            <p class="mb-0">Chưa có người dùng nào trong hệ thống.</p>
                        </td>
                    </tr>
                    <tr th:each="user : ${users}">
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <img class="rounded-circle me-3" th:src="@{https://api.dicebear.com/8.x/initials/svg(seed=${user.username})}" width="40" height="40">
                                <div>
                                    <div class="fw-bold text-dark" th:text="${user.username}">Username</div>
                                    <small class="text-muted" th:text="'ID: ' + ${user.id}">ID</small>
                                </div>
                            </div>
                        </td>
                        <td th:text="${user.fullName}">Full Name</td>
                        <td th:text="${user.email}">Email</td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${user.role.name() == 'ADMIN' ? 'bg-danger' : (user.role.name() == 'BEEKEEPER' ? 'bg-warning text-dark' : 'bg-primary')}"
                                  th:text="${user.role.displayName}">Role</span>
                        </td>
                        <td>
                            <span th:if="${user.enabled}" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25"><i class="bi bi-check-circle me-1"></i>Hoạt động</span>
                            <span th:unless="${user.enabled}" class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25"><i class="bi bi-dash-circle me-1"></i>Đã khoá</span>
                        </td>
                        <td class="text-end pe-4">
                            <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-outline-primary" title="Chỉnh sửa">
                                <i class="bi bi-pencil"></i> Sửa
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
