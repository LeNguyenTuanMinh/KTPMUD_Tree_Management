<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Bee Pollen Management</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-wrapper">

<div class="auth-card" style="max-width: 500px;">
    <!-- Logo -->
    <div class="brand">🐝</div>
    <h3>Tạo tài khoản mới</h3>
    <p class="subtitle">Tham gia Hệ thống Quản lý Phấn hoa</p>

    <!-- Global Error Message -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i>
        <span th:text="${errorMessage}">Đã có lỗi xảy ra</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Registration Form -->
    <form th:action="@{/register}" th:object="${registerRequest}" method="post" id="registerForm">

        <!-- Full Name -->
        <div class="mb-3">
            <label for="fullName" class="form-label">Họ và tên</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-person-badge text-muted"></i></span>
                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                       id="fullName" th:field="*{fullName}" placeholder="Nhập họ và tên" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">
                    Họ và tên bắt buộc nhập
                </div>
            </div>
        </div>

        <!-- Username -->
        <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                       id="username" th:field="*{username}" placeholder="Chọn tên đăng nhập" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                    Tên đăng nhập bắt buộc nhập
                </div>
            </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Địa chỉ Email</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       id="email" th:field="*{email}" placeholder="bạn@example.com" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                    Email hợp lệ bắt buộc nhập
                </div>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       id="password" th:field="*{password}" placeholder="Tạo mật khẩu" required minlength="6">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                    Mật khẩu bắt buộc nhập
                </div>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Xác nhận Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock-fill text-muted"></i></span>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                       placeholder="Nhập lại mật khẩu" required minlength="6">
                <div class="invalid-feedback" id="confirmPasswordError">
                    Mật khẩu không khớp.
                </div>
            </div>
        </div>

        <!-- Role Selection -->
        <div class="mb-4">
            <label for="role" class="form-label">Vai trò</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-shield-check text-muted"></i></span>
                <select class="form-select" th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'"
                        id="role" th:field="*{role}">
                    <option value="STUDENT" selected>Học viên</option>
                    <option value="FARMER">Nông dân</option>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}">
                    Vai trò bắt buộc nhập
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="d-grid mb-4">
            <button type="submit" class="btn btn-honey btn-lg shadow-sm fw-bold" id="registerBtn">
                <i class="bi bi-person-plus me-1"></i> Tạo Tài Khoản
            </button>
        </div>
    </form>

    <!-- Login Link -->
    <div class="text-center text-muted">
        Đã có tài khoản?
        <a th:href="@{/login}" class="text-decoration-none fw-bold text-success">Đăng nhập tại đây</a>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Client-side Password Confirmation Validation -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('registerForm');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const confirmError = document.getElementById('confirmPasswordError');

        function validatePasswords() {
            if (confirmPassword.value && password.value !== confirmPassword.value) {
                confirmPassword.classList.add('is-invalid');
                confirmError.style.display = 'block';
                return false;
            } else {
                confirmPassword.classList.remove('is-invalid');
                confirmError.style.display = 'none';
                return true;
            }
        }

        confirmPassword.addEventListener('input', validatePasswords);
        password.addEventListener('input', function () {
            if (confirmPassword.value) {
                validatePasswords();
            }
        });

        form.addEventListener('submit', function (e) {
            if (!validatePasswords()) {
                e.preventDefault();
                confirmPassword.focus();
            }
        });
    });
</script>

</body>
</html>
