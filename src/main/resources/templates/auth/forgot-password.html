<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Bee Pollen Management</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-wrapper">

<div class="auth-card">
    <!-- Logo -->
    <div class="brand">🐝</div>
    <h3>Quên mật khẩu</h3>
    <p class="subtitle">Nhập email để nhận link đặt lại mật khẩu</p>

    <!-- Success Message -->
    <div th:if="${param.sent}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        Email đặt lại mật khẩu đã được gửi. Vui lòng kiểm tra hộp thư.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Error Message -->
    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i>
        Có lỗi xảy ra. Vui lòng thử lại.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <!-- Token Error Message -->
    <div th:if="${param.tokenError}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i>
        <span th:text="${param.tokenError}">Token error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Forgot Password Form -->
    <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
        <!-- Email -->
        <div class="mb-4">
            <label for="email" class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" class="form-control" id="email" th:field="*{email}"
                       placeholder="Nhập địa chỉ email của bạn" required autofocus>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="d-grid mb-4">
            <button type="submit" class="btn btn-honey btn-lg shadow-sm fw-bold">
                <i class="bi bi-send me-1"></i> Gửi link đặt lại
            </button>
        </div>
    </form>

    <!-- Back to Login Link -->
    <div class="text-center text-muted">
        <a th:href="@{/login}" class="text-decoration-none fw-bold text-success">&larr; Quay lại đăng nhập</a>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
