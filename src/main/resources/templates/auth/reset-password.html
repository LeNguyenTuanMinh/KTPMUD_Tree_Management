<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Bee Pollen Management</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-wrapper">

<div class="auth-card">
    <!-- Logo -->
    <div class="brand">🐝</div>
    <h3>Đặt lại mật khẩu</h3>
    <p class="subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>

    <!-- Error Message -->
    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i>
        <span th:text="${param.error}">Lỗi</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Reset Password Form -->
    <form th:action="@{/reset-password}" th:object="${resetPasswordRequest}" method="post" id="resetForm">
        
        <input type="hidden" th:field="*{token}" />
        
        <!-- New Password -->
        <div class="mb-3">
            <label for="newPassword" class="form-label">Mật khẩu mới</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control" id="newPassword" th:field="*{newPassword}"
                       placeholder="Nhập mật khẩu mới" required minlength="8" autofocus>
            </div>
            <div class="form-text">Mật khẩu phải có ít nhất 8 ký tự.</div>
        </div>
        
        <!-- Confirm Password -->
        <div class="mb-4">
            <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}"
                       placeholder="Nhập lại mật khẩu mới" required>
            </div>
            <div id="passwordMismatchError" class="text-danger small mt-1 d-none">Mật khẩu xác nhận không khớp.</div>
        </div>

        <!-- Submit Button -->
        <div class="d-grid mb-4">
            <button type="submit" class="btn btn-honey btn-lg shadow-sm fw-bold">
                <i class="bi bi-shield-check me-1"></i> Đặt lại mật khẩu
            </button>
        </div>
    </form>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('resetForm').addEventListener('submit', function(event) {
        var newPassword = document.getElementById('newPassword').value;
        var confirmPassword = document.getElementById('confirmPassword').value;
        var errorElement = document.getElementById('passwordMismatchError');
        
        if (newPassword !== confirmPassword) {
            errorElement.classList.remove('d-none');
            event.preventDefault(); // Prevent form submission
        } else {
            errorElement.classList.add('d-none');
        }
    });
</script>

</body>
</html>
