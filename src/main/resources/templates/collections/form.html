<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${trackingId != null ? 'Edit Collection' : 'Add Collection'}">Collection Form</title>
</head>
<body>

<div layout:fragment="content">
    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>
                <i class="bi bi-clipboard-data text-purple me-2" style="color:#8B5CF6"></i>
                <span th:if="${trackingId == null}">Add Collection Record</span>
                <span th:if="${trackingId != null}">Edit Collection Record</span>
            </h2>
            <p class="text-muted mb-0">Manage pollen collection tracking data</p>
        </div>
        <div>
            <a th:href="@{/collections}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Back to List
            </a>
        </div>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body p-4">
                    <form th:action="${trackingId != null} ? @{/collections/{id}/edit(id=${trackingId})} : @{/collections}"
                          th:object="${tracking}" method="post" novalidate>

                        <div class="row g-3">
                            <!-- Colony Selection -->
                            <div class="col-md-6 mb-3">
                                <label for="colonyId" class="form-label">Bee Colony <span class="text-danger">*</span></label>
                                <select class="form-select" id="colonyId" th:field="*{colonyId}"
                                        th:classappend="${#fields.hasErrors('colonyId')} ? 'is-invalid'">
                                    <option value="">-- Select Colony --</option>
                                    <option th:each="c : ${colonies}" th:value="${c.id}"
                                            th:text="${c.colonyCode} + ' (' + ${c.beeSpecies} + ')'"
                                            th:selected="${tracking.colonyId == c.id}">Colony</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('colonyId')}" th:errors="*{colonyId}"></div>
                            </div>

                            <!-- Pollen Selection -->
                            <div class="col-md-6 mb-3">
                                <label for="pollenId" class="form-label">Pollen Type <span class="text-danger">*</span></label>
                                <select class="form-select" id="pollenId" th:field="*{pollenId}"
                                        th:classappend="${#fields.hasErrors('pollenId')} ? 'is-invalid'">
                                    <option value="">-- Select Pollen --</option>
                                    <option th:each="p : ${pollens}" th:value="${p.id}"
                                            th:text="${p.name}"
                                            th:selected="${tracking.pollenId == p.id}">Pollen</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('pollenId')}" th:errors="*{pollenId}"></div>
                            </div>

                            <!-- Collected Weight -->
                            <div class="col-md-6 mb-3">
                                <label for="collectedWeight" class="form-label">Collected Weight (g) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="collectedWeight"
                                       th:field="*{collectedWeight}" step="0.01" min="0.01"
                                       th:classappend="${#fields.hasErrors('collectedWeight')} ? 'is-invalid'"
                                       placeholder="e.g. 15.50">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('collectedWeight')}" th:errors="*{collectedWeight}"></div>
                            </div>

                            <!-- Collection Date -->
                            <div class="col-md-6 mb-3">
                                <label for="collectionDate" class="form-label">Collection Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="collectionDate"
                                       th:field="*{collectionDate}"
                                       th:classappend="${#fields.hasErrors('collectionDate')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('collectionDate')}" th:errors="*{collectionDate}"></div>
                            </div>

                            <!-- Note -->
                            <div class="col-12 mb-3">
                                <label for="note" class="form-label">Note</label>
                                <textarea class="form-control" id="note" th:field="*{note}" rows="3"
                                          placeholder="Optional notes about this collection..."></textarea>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                            <a th:href="@{/collections}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-honey">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:if="${trackingId == null}">Create Record</span>
                                <span th:if="${trackingId != null}">Update Record</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
