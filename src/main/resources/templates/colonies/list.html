<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/main}">
<head>
    <title>Bee Colonies - Bee Pollen Management</title>
</head>
<body>

<div layout:fragment="content">
    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2><i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i> Bee Colonies</h2>
            <p class="text-muted mb-0">Manage bee colonies</p>
        </div>
        <div>
            <a th:href="@{/colonies/new}" class="btn btn-honey"
               sec:authorize="hasAnyRole('ADMIN','BEEKEEPER')">
                <i class="bi bi-plus-lg me-1"></i> Add Colony
            </a>
        </div>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search Bar -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form th:action="@{/colonies}" method="get" class="search-box">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" name="keyword" placeholder="Search colonies..."
                           th:value="${keyword}">
                    <button class="btn btn-honey" type="submit">Search</button>
                    <a th:if="${keyword != null and !keyword.isEmpty()}" th:href="@{/colonies}"
                       class="btn btn-outline-secondary"><i class="bi bi-x-lg"></i></a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table Card -->
    <div class="card shadow-sm border-0 mb-4" th:if="${colonies != null and !colonies.isEmpty()}">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Colony Code</th>
                        <th>Bee Species</th>
                        <th>Health Status</th>
                        <th>Population</th>
                        <th>Lat / Lng</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="colony, idx : ${colonies}">
                        <td class="ps-4 text-muted small" th:text="${pageData.number * pageData.size + idx.index + 1}">1</td>
                        <td>
                            <a th:href="@{/colonies/{id}(id=${colony.id})}" class="fw-bold text-decoration-none text-primary"
                               th:text="${colony.colonyCode}">COL-001</a>
                        </td>
                        <td class="fw-semibold text-dark" th:text="${colony.beeSpecies}">Apis mellifera</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${colony.healthStatus == 'HEALTHY'} ? 'bg-success' :
                                                  (${colony.healthStatus == 'WEAK'} ? 'bg-warning text-dark' :
                                                  (${colony.healthStatus == 'CRITICAL'} ? 'bg-danger' : 'bg-dark'))"
                                  th:text="${colony.healthStatus}">HEALTHY</span>
                        </td>
                        <td th:text="${colony.estimatedPopulation != null} ? ${#numbers.formatInteger(colony.estimatedPopulation, 1, 'COMMA')} : '—'">—</td>
                        <td>
                            <small th:if="${colony.latitude != null}" class="text-muted"
                                   th:text="${#numbers.formatDecimal(colony.latitude, 1, 4)} + ', ' + ${#numbers.formatDecimal(colony.longitude, 1, 4)}">—</small>
                            <small th:unless="${colony.latitude != null}" class="text-muted">N/A</small>
                        </td>
                        <td class="text-end pe-4">
                            <a th:href="@{/colonies/{id}(id=${colony.id})}" class="btn btn-sm btn-outline-info" title="View">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/colonies/{id}/edit(id=${colony.id})}" class="btn btn-sm btn-outline-warning" title="Edit"
                               sec:authorize="hasAnyRole('ADMIN','BEEKEEPER')">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button type="button" class="btn btn-sm btn-outline-danger" title="Delete"
                                    sec:authorize="hasAnyRole('ADMIN','BEEKEEPER')"
                                    data-bs-toggle="modal" data-bs-target="#deleteModal"
                                    th:data-delete-url="@{/colonies/{id}/delete(id=${colony.id})}"
                                    th:data-delete-name="${colony.colonyCode}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white py-3 border-top-0">
            <!-- Pagination -->
            <div th:replace="~{fragments/components :: pagination(${pageData}, '/colonies')}"></div>
        </div>
    </div>
    
    <!-- Empty State -->
    <div class="text-center py-5 bg-white rounded shadow-sm" th:if="${colonies == null or colonies.isEmpty()}">
        <i class="bi bi-hexagon display-1 text-muted mb-3 d-block" style="opacity: 0.2;"></i>
        <h4 class="text-muted mb-3">No bee colonies found.</h4>
        <p class="text-muted mb-4">You haven't added any bee colonies yet.</p>
        <a th:href="@{/colonies/new}" class="btn btn-honey" sec:authorize="hasAnyRole('ADMIN','BEEKEEPER')">
            <i class="bi bi-plus-lg me-1"></i> Add First Colony
        </a>
    </div>

</div>

<th:block layout:fragment="script-extras">
    <!-- Delete Confirmation Modal -->
    <div th:replace="~{fragments/components :: confirm-delete}"></div>
</th:block>

</body>
</html>
