# =============================================================
#  Bee Pollen & Plant Management System — Application Config
# =============================================================

server:
  port: 8080

# -------------------- DataSource (MySQL) --------------------
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/bee_pollen_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  # -------------------- JPA / Hibernate --------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # -------------------- Thymeleaf --------------------
  thymeleaf:
    cache: false

# -------------------- JWT Configuration --------------------
app:
  base-url: http://localhost:8080
  jwt:
    secret: bee-pollen-management-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000

# -------------------- Email Configuration --------------------
# Uncomment and configure to enable email sending for forgot password feature
# spring:
#   mail:
#     host: smtp.gmail.com
#     port: 587
#     username: your-email@gmail.com
#     password: your-app-password
#     properties:
#       mail:
#         smtp:
#           auth: true
#           starttls:
#             enable: true

# -------------------- Gemini AI Configuration --------------------
gemini:
  api:
    key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash

# -------------------- IoT Simulation --------------------
iot:
  simulator:
    enabled: true
    initial-delay-ms: 15000
    interval-ms: 180000        # 3 minutes
    report-probability: 0.7
    min-quantity-grams: 5
    max-quantity-grams: 80
  api:
    key: ${IOT_API_KEY:dev-secret-key}
